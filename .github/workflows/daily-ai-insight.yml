name: Daily AI Insight

on:
  schedule:
    # GitHub cron is UTC. 07:00 UTC ≈ 3 AM US Eastern (EDT) and 08:00 UTC ≈ 3 AM (EST).
    # Both fire; the script's per-day idempotency posts only the first one each Eastern day.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Post even if today's article already exists (for testing)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-ai-insight
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the Anthropic SDK
        run: pip install --upgrade anthropic

      - name: Generate today's article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE: ${{ github.event.inputs.force }}
        run: python scripts/generate_insight.py

      - name: Commit and push if the page changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "AI insight: daily update ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes — nothing to commit today."
          fi
